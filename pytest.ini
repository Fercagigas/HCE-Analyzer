[pytest]
# Test discovery
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Markers
markers =
    slow: marks tests as slow (deselect with '-m "not slow"')
    integration: marks tests as integration tests
    unit: marks tests as unit tests

# Warning filters - suppress external library warnings
filterwarnings =
    ignore::DeprecationWarning:pydantic.*
    ignore::DeprecationWarning:supabase.*
    ignore::DeprecationWarning:postgrest.*
    ignore:Using extra keyword arguments on `Field` is deprecated:DeprecationWarning
    ignore:The 'timeout' parameter is deprecated:DeprecationWarning
    ignore:The 'verify' parameter is deprecated:DeprecationWarning
    ignore::FutureWarning:pandas.*
    ignore::pytest.PytestUnraisableExceptionWarning

# Output settings
addopts = -v --tb=short

# Async mode
asyncio_mode = auto
